<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Bericht anlegen</title>
</head>
<body>

    <h1>Neuen Bericht anlegen für <span th:text="${gericht.name}">Gericht</span></h1>

    <form th:action="@{/berichte/neu/{nummer}(nummer=${gericht.nummer})}" method="post">
        <label>Wölflinge / Grundschüler: <input type="number" name="anzahlWoelflinge" ></label><br>
        <label>Pfadfinder / 12 bis 16 Jahre: <input type="number" name="anzahlPfadfinder" ></label><br>
        <label>Ranger/Rover / älter als 16: <input type="number" name="anzahlRangerRover" ></label><br>

        <h2>Prozentualer Überschuss pro Zutat</h2>

        <div th:each="zutat : ${gericht.zutatenlisteProPerson}">
            <label th:text="${zutat.name} + ' – Prozentualer Überschuss (%):'">Zutat</label>
            <input type="number" step="any" name="ueberschuss">
        </div>

        <button type="submit">Speichern</button>
    </form>

    <p><a th:href="@{/berichte/{nummer}(nummer=${gericht.nummer})}">Abbrechen</a></p>

</body>
</html>
