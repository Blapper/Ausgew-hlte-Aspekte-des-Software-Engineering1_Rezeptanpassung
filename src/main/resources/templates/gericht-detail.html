<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><title>Gericht-Details</title></head>
<body>
    <h1 th:text="${gericht.name}">Gerichtname</h1>

    <p><a th:href="@{/gerichte}">Zurück zur Gerichteübersicht</a></p>

    <p><a th:href="@{/berichte/{nummer}(nummer=${gericht.nummer})}">Weiter zu den Berichten</a></p>

    <p><a th:href="@{/gerichte/{nummer}/loeschen(nummer=${gericht.nummer})}">Gericht löschen</a></p>

    <p><a th:href="@{/gerichte/{nummer}/zutaten/neu(nummer=${gericht.nummer})}">Zutat hinzufügen</a></p>

    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <th>Nummer</th>
            <td th:text="${gericht.nummer}">0815</td>
        </tr>
        <tr>
            <th>Name</th>
            <td th:text="${gericht.name}">Pfannkuchen</td>
        </tr>
        <tr>
            <th>Version</th>
            <td th:text="${gericht.version}">v1</td>
        </tr>
    </table>

    <h2>Zutaten pro Person</h2>

    <p th:if="${#lists.isEmpty(gericht.zutatenlisteProPerson)}">Keine Zutaten hinterlegt.</p>

    <table border="1" cellpadding="5" cellspacing="0" th:if="${not #lists.isEmpty(gericht.zutatenlisteProPerson)}">
        <thead>
            <tr>
                <th>Zutat</th>
                <th>Menge</th>
                <th>Einheit</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="zutat, iter : ${gericht.zutatenlisteProPerson}">
                <td th:text="${zutat.name}">Mehl</td>
                <td th:text="${zutat.menge}">100</td>
                <td th:text="${zutat.einheit}">g</td>
                <td><a th:href="@{/gerichte/{nummer}/zutaten/{index}/loeschen(nummer=${gericht.nummer}, index=${iter.index})}">Löschen</a></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
