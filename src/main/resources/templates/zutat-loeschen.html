<!DOCTYPE html>
<html lang="de" xmlns:th="http://www.thymeleaf.org">
<head>
<title>Zutat löschen</title>
</head>
<body>

    <h1>Zutat löschen</h1>

    <p>Soll die Zutat <strong th:text="${zutat.name}">Zutat</strong>
       (<span th:text="${zutat.menge}">100</span> <span th:text="${zutat.einheit}">einheit</span>) wirklich gelöscht werden?</p>

    <form th:action="@{/gerichte/{nummer}/zutaten/{index}/loeschen(nummer=${gericht.nummer}, index=${index})}" method="post">
        <button type="submit">Ja, löschen</button>
    </form>

    <p><a th:href="@{/gerichte/{nummer}(nummer=${gericht.nummer})}">Abbrechen</a></p>

</body>
</html>
